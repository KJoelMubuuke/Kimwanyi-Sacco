<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://java.sun.com/jsf/html"
      xmlns:f="http://java.sun.com/jsf/core">
<h:head>
    <title>Member Dashboard — Kimwanyi SACCO</title>
</h:head>
<h:body>
    <h2>Member Dashboard</h2>
    <p>Welcome, <h:outputText value="#{loginBean.currentUser.displayName}" />.</p>
    <h3>Your Balance</h3>
    <p>
        <h:outputText value="#{memberDashboardBean.balance}">
            <f:convertNumber type="currency" currencySymbol="UGX " minFractionDigits="2"/>
        </h:outputText>
    </p>
    <h3>Transaction History</h3>
    <h:dataTable value="#{memberDashboardBean.statement}" var="txn" border="1" cellpadding="6">
        <h:column>
            <f:facet name="header">Date</f:facet>
            <h:outputText value="#{txn.createdAt}" />
        </h:column>
        <h:column>
            <f:facet name="header">Type</f:facet>
            <h:outputText value="#{txn.type}" />
        </h:column>
        <h:column>
            <f:facet name="header">Amount</f:facet>
            <h:outputText value="#{txn.amount}">
                <f:convertNumber type="currency" currencySymbol="UGX " minFractionDigits="2"/>
            </h:outputText>
        </h:column>
        <h:column>
            <f:facet name="header">Balance After</f:facet>
            <h:outputText value="#{txn.balanceAfter}">
                <f:convertNumber type="currency" currencySymbol="UGX " minFractionDigits="2"/>
            </h:outputText>
        </h:column>
        <h:column>
            <f:facet name="header">Description</f:facet>
            <h:outputText value="#{txn.description}" />
        </h:column>
    </h:dataTable>
    <br/>
    <h:form>
        <h:commandButton value="Log out" action="#{loginBean.logout}" />
    </h:form>
</h:body>
</html>
