<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://java.sun.com/jsf/html"
      xmlns:f="http://java.sun.com/jsf/core">
<h:head>
    <title>Admin Dashboard — Kimwanyi SACCO</title>
</h:head>
<h:body>
    <h2>Admin Dashboard</h2>
    <p>Welcome, <h:outputText value="#{loginBean.currentUser.displayName}" />.</p>
    <h3>System Summary</h3>
    <table border="1" cellpadding="6">
        <tr>
            <td>Total Active Members</td>
            <td><h:outputText value="#{adminDashboardBean.summary.totalActiveMembers}" /></td>
        </tr>
        <tr>
            <td>Total Savings Held</td>
            <td><h:outputText value="#{adminDashboardBean.summary.totalSavingsHeld}">
                <f:convertNumber type="currency" currencySymbol="UGX " minFractionDigits="2"/>
            </h:outputText></td>
        </tr>
        <tr>
            <td>Active Loans</td>
            <td><h:outputText value="#{adminDashboardBean.summary.activeLoansCount}" /></td>
        </tr>
        <tr>
            <td>Total Outstanding Loan Balance</td>
            <td><h:outputText value="#{adminDashboardBean.summary.totalOutstandingLoanBalance}">
                <f:convertNumber type="currency" currencySymbol="UGX " minFractionDigits="2"/>
            </h:outputText></td>
        </tr>
        <tr>
            <td>Pending Loan Applications</td>
            <td><h:outputText value="#{adminDashboardBean.summary.pendingApplicationsCount}" /></td>
        </tr>
    </table>
    <br/>
    <h:form>
        <h:commandButton value="Log out" action="#{loginBean.logout}" />
    </h:form>
</h:body>
</html>
